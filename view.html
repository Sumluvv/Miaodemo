<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiaoDemo Community</title>
    
    <!-- Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#3b82f6', 600: '#2563EB' } }
                }
            }
        }
    </script>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="i18n.js"></script>
    <script>MiaoI18n.init();</script>

    <style>
        [x-cloak] { display: none !important; }
        .masonry-grid { column-count: 1; gap: 1.5rem; }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        .break-inside-avoid { break-inside: avoid; }
    </style>
</head>

<body class="bg-slate-50 text-gray-800 min-h-screen font-sans" x-data="viewer()">

    <!-- VIEW: COMMUNITY PLAZA -->
    <div x-show="!currentId" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur border-b border-gray-200 sticky top-0 z-30">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity rounded-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500" :title="t('backWorkbench')">
                    <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white font-bold">M</div>
                    <span class="font-bold text-gray-900 tracking-tight" x-text="t('plazaTitle')"></span>
                </a>
                <div class="flex items-center gap-2 sm:gap-3">
                    <div class="relative">
                        <button type="button"
                                @click="langMenuOpen = !langMenuOpen"
                                class="p-2 rounded-lg border border-gray-200 bg-white hover:bg-gray-50 text-gray-600 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500"
                                :title="t('language')"
                                :aria-label="t('language')">
                            <i data-lucide="languages" class="w-4 h-4"></i>
                        </button>
                        <div x-cloak x-show="langMenuOpen" @click.away="langMenuOpen = false"
                             class="absolute top-full right-0 mt-1.5 w-[9.5rem] max-h-64 overflow-y-auto bg-white rounded-xl shadow-lg border border-gray-100 py-1 z-50">
                            <template x-for="opt in langOptions" :key="opt.code">
                                <button type="button"
                                        @click="setLanguage(opt.code); langMenuOpen = false"
                                        class="w-full text-left px-3 py-2 text-xs hover:bg-gray-50 flex items-center justify-between gap-2"
                                        :class="lang === opt.code ? 'text-brand-600 font-semibold bg-brand-50/50' : 'text-gray-700'">
                                    <span x-text="opt.label" class="truncate"></span>
                                    <span x-show="lang === opt.code" class="text-brand-600 shrink-0">✓</span>
                                </button>
                            </template>
                        </div>
                    </div>
                    <a href="index.html" class="hidden sm:flex items-center gap-2 px-4 py-2 bg-gray-900 text-white rounded-full text-sm font-medium hover:bg-black transition-all">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span x-text="t('createNew')"></span>
                    </a>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
            <div x-show="isLoading" class="flex justify-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-600"></div>
            </div>

            <div x-show="!isLoading" class="masonry-grid">
                <template x-for="project in projects" :key="project.id">
                    <a :href="'?id=' + project.id" class="break-inside-avoid block bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 overflow-hidden mb-6 group">
                        <!-- Preview Thumbnail (Scaled Iframe) -->
                        <div class="aspect-[4/3] bg-gray-100 relative overflow-hidden">
                            <iframe :srcdoc="project.code_html" class="w-[200%] h-[200%] origin-top-left scale-50 pointer-events-none border-none select-none" tabindex="-1"></iframe>
                            <div class="absolute inset-0 bg-transparent z-10"></div>
                        </div>
                        
                        <div class="p-4">
                            <h3 class="font-semibold text-gray-900 truncate" x-text="project.title || t('untitled')"></h3>
                            <div class="flex items-center justify-between mt-3">
                                <div class="flex items-center gap-2">
                                    <div class="w-5 h-5 bg-gray-100 rounded-full flex items-center justify-center text-[10px] text-gray-500 font-bold" x-text="authorInitial(project)"></div>
                                    <span class="text-xs text-gray-500 truncate max-w-[80px]" x-text="authorLabel(project)"></span>
                                </div>
                                <div class="flex items-center gap-3 text-xs text-gray-400">
                                    <span class="flex items-center gap-1 group-hover:text-pink-500 transition-colors"><i data-lucide="heart" class="w-3 h-3"></i> <span x-text="project.likes || 0"></span></span>
                                    <span class="text-brand-600 font-medium opacity-0 group-hover:opacity-100 transition-opacity" x-text="t('view')"></span>
                                </div>
                            </div>
                        </div>
                    </a>
                </template>
            </div>
            
            <div x-show="!isLoading && projects.length === 0" class="text-center py-20">
                <div class="text-gray-300 mb-4"><i data-lucide="ghost" class="w-12 h-12 mx-auto"></i></div>
                <p class="text-gray-500" x-text="t('noPublic')"></p>
                <a href="index.html" class="text-brand-600 hover:underline mt-2 inline-block" x-text="t('beFirst')"></a>
            </div>
        </main>
        
        <!-- Mobile Fab -->
        <a href="index.html" class="sm:hidden fixed bottom-6 right-6 w-14 h-14 bg-black text-white rounded-full shadow-xl flex items-center justify-center z-40">
            <i data-lucide="plus" class="w-6 h-6"></i>
        </a>
    </div>

    <!-- VIEW: FULLSCREEN DETAIL -->
    <div x-cloak x-show="currentId" class="fixed inset-0 bg-white flex flex-col z-50">
        <!-- Floating Capsule Nav -->
        <div class="absolute top-6 left-1/2 -translate-x-1/2 z-50 animate-in slide-in-from-top-4 duration-500">
            <div class="flex items-center gap-1 p-1.5 bg-white/90 backdrop-blur-md rounded-full border border-gray-200 shadow-xl transition-all hover:scale-[1.01]">
                
                <a href="view.html" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors text-gray-600">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                </a>
                
                <div class="h-4 w-px bg-gray-200 mx-1"></div>
                
                <div class="px-2 max-w-[120px] md:max-w-[200px]">
                    <p class="text-xs font-semibold text-gray-800 truncate" x-text="activeProject?.title || t('loading')"></p>
                    <p class="text-[10px] text-gray-400 truncate" x-text="t('byAuthor', { name: authorLabel(activeProject) })"></p>
                </div>

                <div class="h-4 w-px bg-gray-200 mx-1"></div>

                <button @click="likeProject()" class="group flex items-center gap-1.5 px-3 py-1.5 rounded-full hover:bg-pink-50 transition-colors" :title="pb.authStore.isValid ? t('like') : t('loginToLike')">
                    <i data-lucide="heart" class="w-3.5 h-3.5 text-gray-400 group-hover:text-pink-500 transition-colors" :class="liked ? 'fill-pink-500 text-pink-500' : ''"></i>
                    <span class="text-xs font-medium text-gray-600" x-text="activeProject?.likes || 0"></span>
                </button>

                <a :href="remixHref" class="flex items-center gap-1.5 px-4 py-1.5 bg-brand-600 text-white rounded-full hover:bg-brand-700 transition-colors text-xs font-medium shadow-sm ml-1">
                    <i data-lucide="git-fork" class="w-3 h-3"></i>
                    <span x-text="t('remix')"></span>
                </a>
            </div>
        </div>

        <!-- Fullscreen Iframe -->
        <div class="flex-1 w-full h-full bg-slate-50 relative">
            <iframe :srcdoc="activeDoc" class="w-full h-full border-none" sandbox="allow-scripts allow-modals allow-same-origin allow-forms"></iframe>
        </div>

        <!-- QR Code Corner -->
        <div class="hidden md:block absolute bottom-6 right-6 group">
            <div class="bg-white/90 backdrop-blur p-3 rounded-2xl shadow-lg border border-gray-200 transition-all hover:scale-105">
                <div id="qrcode-desktop" class="opacity-80 group-hover:opacity-100 transition-opacity"></div>
                <p class="text-[9px] text-center mt-2 text-gray-400 uppercase tracking-widest" x-text="t('scan')"></p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div x-cloak x-show="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 backdrop-blur text-white px-6 py-3 rounded-full shadow-xl z-[60] text-sm font-medium max-w-[90vw] text-center"
         :class="toastKind === 'success' ? 'bg-green-600/95' : 'bg-red-500/90'">
        <span x-text="toast"></span>
    </div>

    <script>
        const CONFIG = { POCKETBASE_URL: "https://db.miaodemo.com" };
        const pb = new PocketBase(CONFIG.POCKETBASE_URL);

        function authorFromProject(project) {
            return project?.expand?.author_id || null;
        }

        function displayAuthor(user) {
            if (!user) return MiaoI18n.t('unknown');
            const name = (user.name || user.username || '').trim();
            if (name) return name;
            if (user.email) return user.email.split('@')[0];
            return MiaoI18n.t('creator');
        }

        document.addEventListener('alpine:init', () => {
            Alpine.data('viewer', () => ({
                currentId: null,
                projects: [],
                activeProject: null,
                isLoading: true,
                liked: false,
                toast: '',
                toastKind: 'error',
                lang: MiaoI18n.getLang(),
                langMenuOpen: false,
                get langOptions() { return MiaoI18n.getOptions(); },

                t(key, params) {
                    void this.lang;
                    return MiaoI18n.t(key, params);
                },

                setLanguage(code) {
                    MiaoI18n.setLang(code);
                    this.lang = code;
                    document.title = MiaoI18n.t('pageTitleView');
                    this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
                },

                get remixHref() {
                    return this.currentId ? `index.html?remix_id=${this.currentId}` : 'index.html';
                },

                authorLabel(project) {
                    return displayAuthor(authorFromProject(project));
                },

                authorInitial(project) {
                    const label = this.authorLabel(project);
                    return (label[0] || 'U').toUpperCase();
                },

                showToast(message, kind = 'error') {
                    this.toast = message;
                    this.toastKind = kind;
                    clearTimeout(this._toastTimer);
                    this._toastTimer = setTimeout(() => { this.toast = ''; }, 3500);
                },

                async init() {
                    this.lang = MiaoI18n.getLang();
                    document.title = MiaoI18n.t('pageTitleView');
                    lucide.createIcons();
                    const params = new URLSearchParams(window.location.search);
                    this.currentId = params.get('id');

                    if (this.currentId) {
                        await this.loadDetail(this.currentId);
                    } else {
                        await this.loadList();
                    }
                },

                async fetchLikeCount(projectId) {
                    try {
                        const res = await pb.collection('project_likes').getList(1, 1, {
                            filter: `project = "${projectId}"`,
                        });
                        return res.totalItems || 0;
                    } catch (e) {
                        return 0;
                    }
                },

                async loadList() {
                    try {
                        const result = await pb.collection('projects').getList(1, 50, {
                            sort: '-created',
                            expand: 'author_id',
                            filter: 'is_public = true'
                        });
                        const items = result.items;
                        await Promise.all(items.map(async (p) => {
                            p.likes = await this.fetchLikeCount(p.id);
                        }));
                        this.projects = items;
                    } catch (e) {
                        console.error(e);
                        this.showToast(this.t('toastLoadPlazaFail'));
                    } finally {
                        this.isLoading = false;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                async loadDetail(id) {
                    try {
                        this.activeProject = await pb.collection('projects').getOne(id, { expand: 'author_id' });
                        this.activeProject.likes = await this.fetchLikeCount(id);

                        const likedPosts = JSON.parse(localStorage.getItem('liked_projects') || '[]');
                        if (likedPosts.includes(id)) this.liked = true;

                        this.$nextTick(() => {
                            const el = document.getElementById('qrcode-desktop');
                            if (el) {
                                el.innerHTML = '';
                                new QRCode(el, { text: window.location.href, width: 64, height: 64 });
                            }
                            lucide.createIcons();
                        });
                    } catch (e) {
                        console.error(e);
                        const msg = e?.status === 404 || e?.status === 403
                            ? this.t('toastPrivateProject')
                            : this.t('toastLoadError');
                        this.showToast(msg);
                        setTimeout(() => { window.location.href = 'view.html'; }, 2200);
                    }
                },

                get activeDoc() {
                    if (!this.activeProject) return '';
                    return this.activeProject.code_html || '';
                },

                async likeProject() {
                    if (this.liked || !this.activeProject) return;

                    if (!pb.authStore.isValid) {
                        this.showToast(this.t('toastLoginToLike'));
                        return;
                    }

                    const projectId = this.activeProject.id;
                    const userId = pb.authStore.model.id;

                    try {
                        const existing = await pb.collection('project_likes').getList(1, 1, {
                            filter: `project = "${projectId}" && user = "${userId}"`,
                        });
                        if (existing.totalItems > 0) {
                            this.liked = true;
                            this.showToast(this.t('toastAlreadyLiked'), 'success');
                            return;
                        }

                        await pb.collection('project_likes').create({
                            project: projectId,
                            user: userId,
                        });

                        this.liked = true;
                        this.activeProject.likes = (this.activeProject.likes || 0) + 1;

                        const likedPosts = JSON.parse(localStorage.getItem('liked_projects') || '[]');
                        if (!likedPosts.includes(projectId)) {
                            likedPosts.push(projectId);
                            localStorage.setItem('liked_projects', JSON.stringify(likedPosts));
                        }
                        this.showToast(this.t('toastThanksLike'), 'success');
                    } catch (e) {
                        console.error(e);
                        this.showToast(e?.message || this.t('toastLikeFail'));
                    }
                }
            }))
        })
    </script>
</body>
</html>
